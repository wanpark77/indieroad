server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:indiroad;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    show-sql: false
  sql:
    init:
      mode: always

upload:
  dir: uploads
  base-url: http://localhost:8080

jwt:
  secret: aW5kaXJvYWQtc3VwZXItc2VjcmV0LWtleS1mb3ItaW5kaXJvYWQtYmFja2VuZC0yMDI0LXYx
  expiration: 3600000  # 1 hour in milliseconds

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

logging:
  level:
    com.indiroad: INFO
    org.springframework.security: WARN
